x-app: &app
  build:
    context: .
    dockerfile: docker/php/Dockerfile
  volumes:
    - .:/var/www/html
  depends_on:
    mysql:
      condition: service_healthy
  networks:
    - apigoalgus

services:
  app:
    <<: *app

  nginx:
    image: nginx:alpine
    ports:
      - "8069:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - apigoalgus

  mysql:
    image: mysql:8.0
    ports:
      - "33069:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: apigoalgus
      MYSQL_USER: apigoalgus
      MYSQL_PASSWORD: secret
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - apigoalgus

  scheduler:
    <<: *app
    command: php artisan schedule:work
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      app:
        condition: service_started

networks:
  apigoalgus:
    driver: bridge

volumes:
  mysql_data:
