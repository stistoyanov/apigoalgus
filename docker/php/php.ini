; Mirror production (api.goalgus.bg .user.ini) so local matches server limits.
memory_limit = 256M
upload_max_filesize = 250M
post_max_size = 250M
session.gc_maxlifetime = 1440
zlib.output_compression = 0
max_execution_time = 600
max_input_time = 900
max_input_vars = 5000
display_errors = 1
session.save_path = /tmp
allow_url_include = 0
allow_url_fopen = 1
